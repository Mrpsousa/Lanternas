<section class="section contato" id="contato">
  <div class="container">
    <h2 class="section-title">Entre em Contato</h2>
    <p class="section-subtitle">Quer saber mais, ser voluntário ou propor parcerias? Fale com a gente!</p>

    <div class="grid-2 contato__grid">
      <div class="contato__info">
        <div class="contato__item">
          <div class="contato__icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <h4>Endereço</h4>
            <p>Rua Vila Nova Cruzada, 23<br/>Cidade de Deus (Karatê - Rocinha 2)</p>
          </div>
        </div>

        <div class="contato__item">
          <div class="contato__icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div>
            <h4>E-mail</h4>
            <a href="mailto:atendimento@lanternasprojetosocial.org">atendimento&#64;lanternasprojetosocial.org</a>
          </div>
        </div>

        <div class="contato__item">
          <div class="contato__icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
          <div>
            <h4>Whatsapp</h4>
            <a href="https://wa.me/552120428367?text=Ol%C3%A1,%20Acessei%20o%20site%20e%20gostaria%20de%20informa%C3%A7%C3%B5es" target="_blank">(21) 2042-8367</a>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <form class="contato__form">
        <div class="contato__form-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome completo" />
        </div>
        <div class="contato__form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" />
        </div>
        <div class="contato__form-group">
          <label for="assunto">Assunto</label>
          <input type="text" id="assunto" name="assunto" placeholder="Assunto da mensagem" />
        </div>
        <div class="contato__form-group">
          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" name="mensagem" rows="5" placeholder="Sua mensagem..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary contato__submit">Enviar</button>
      </form>
    </div>
  </div>
</section>
